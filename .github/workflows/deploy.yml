# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：当推送到 main 分支时自动执行
on:
  push:
    branches: [master]

# 权限配置（v4 版本的 Pages Action 需要）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 推荐使用 18 或 20
          cache: 'npm'        # 启用 npm 缓存加速

      # 3. 安装依赖（npm ci 比 npm install 更快更稳定）
      - name: Install dependencies
        run: npm ci

      # 4. 构建项目
      - name: Build
        run: npm run build

      # 5. 上传构建产物作为 artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 部署任务
  deploy:
    needs: build  # 等待 build 任务完成后再执行
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 6. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment